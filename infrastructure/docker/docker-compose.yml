name: company-brain

services:
  postgres:
    image: postgres:17-alpine
    container_name: brain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain_dev_password
      POSTGRES_DB: company_brain
    ports:
      # Host port 5433 to avoid clashing with a locally installed Postgres.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brain -d company_brain']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: brain-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: brain-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: brain_minio
      MINIO_ROOT_PASSWORD: brain_minio_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: brain-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  temporal:
    image: temporalio/auto-setup:1.27
    container_name: brain-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: '5432'
      POSTGRES_USER: brain
      POSTGRES_PWD: brain_dev_password
      POSTGRES_SEEDS: postgres
      # auto-setup creates the "temporal" + "temporal_visibility" databases
      # and registers this namespace on first boot.
      DEFAULT_NAMESPACE: company-brain
      DEFAULT_NAMESPACE_RETENTION: 7d
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      - '7233:7233'
    healthcheck:
      # The server binds the container IP (not loopback), so probe via the
      # service hostname.
      test: ['CMD-SHELL', 'temporal operator cluster health --address temporal:7233 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: brain-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
      TEMPORAL_DEFAULT_NAMESPACE: company-brain
    ports:
      # Host port 8233 (8080 is taken by Adminer).
      - '8233:8080'

  adminer:
    image: adminer:latest
    container_name: brain-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - '8080:8080'

  # Meeting capture bot (Linux-only: Chromium + PulseAudio + ffmpeg +
  # whisper.cpp). Behind the "bot" profile so the default `infra:up` doesn't
  # build the heavy whisper image. Start with:
  #   docker compose --profile bot up -d meeting-bot
  # The meeting-worker must reach it at localhost:4200, and pass a callback
  # base URL the container can reach back on (host.docker.internal). Set
  # API_BASE_URL=http://host.docker.internal:4000 on the meeting-worker.
  meeting-bot:
    build:
      context: ../../services/meeting-bot
    container_name: brain-meeting-bot
    restart: unless-stopped
    profiles: ['bot']
    environment:
      MEETING_INTERNAL_TOKEN: ${MEETING_INTERNAL_TOKEN:-dev-meeting-internal-token}
      MEETING_WHISPER_MODEL: ${MEETING_WHISPER_MODEL:-base.en}
      BOT_CAPTURE_WINDOW_SECONDS: ${BOT_CAPTURE_WINDOW_SECONDS:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    ports:
      - '4200:4200'
    # Chromium needs more shared memory than the 64 MB default.
    shm_size: '1gb'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4200/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
